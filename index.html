<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Universal Payout & Global Forex</title>
    <style>
        :root { --brand: #fe2c55; --bg: #0b0e11; --card: #1e2329; --text: #eaecef; --muted: #848e9c; --green: #25d366; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .wrapper { width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #333; }
        h1 { color: var(--brand); text-align: center; font-size: 22px; margin: 5px 0; }
        
        label { font-size: 11px; color: var(--muted); margin-bottom: 5px; display: block; text-transform: uppercase; font-weight: bold; }
        select, input { width: 100%; padding: 12px; background: #2b3139; border: 1px solid #474d57; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; }

        /* INPUT TOGGLE */
        .toggle-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .toggle-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #474d57; background: #181a20; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .toggle-btn.active { background: var(--brand); color: white; border-color: var(--brand); }

        /* RESULTS */
        .main-display { background: #2b3139; padding: 20px; border-radius: 18px; text-align: center; border: 2px solid var(--brand); margin-bottom: 15px; }
        .usd-amt { font-size: 44px; font-weight: 800; color: var(--brand); display: block; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #181a20; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-val { display: block; font-weight: bold; font-size: 16px; color: var(--green); }

        /* LISTS */
        .currency-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .cur-item { background: #181a20; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; font-size: 13px; border: 1px solid #2b3139; }
        .cur-val { font-weight: bold; color: #f0b90b; }
        #searchResult { background: var(--green); color: black; padding: 12px; border-radius: 12px; margin: 10px 0; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1>TikTok Global Revenue</h1>
        
        <label>1. What are you entering?</label>
        <div class="toggle-container">
            <button class="toggle-btn active" id="btnCoin" onclick="setMode('coin')">GIFT COINS</button>
            <button class="toggle-btn" id="btnDiamond" onclick="setMode('diamond')">CREATOR DIAMONDS</button>
        </div>

        <label id="inputLabel">Enter Amount of Coins</label>
        <input type="number" id="mainInput" placeholder="Ex: 1000" oninput="calculate()">

        <div class="main-display">
            <label>Estimated Cash Payout</label>
            <span class="usd-amt" id="usdResult">$0.00</span>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <label style="font-size:9px;">Fan Cost</label>
                <span class="stat-val" style="color:#ff708d;" id="fanCost">$0.00</span>
            </div>
            <div class="stat-box">
                <label style="font-size:9px;">Platform Fee</label>
                <span class="stat-val" style="color:#848e9c;">50%</span>
            </div>
        </div>
    </div>

    <div class="card">
        <label>Select Your Country</label>
        <select id="countrySelect" onchange="applyCountry()">
            <option value="">-- All Countries --</option>
            <option value="USD">United States (USD)</option>
            <option value="EUR">European Union (EUR)</option>
            <option value="GBP">United Kingdom (GBP)</option>
            <option value="LBP">Lebanon (LBP)</option>
            <option value="AED">UAE (AED)</option>
            <option value="SAR">Saudi Arabia (SAR)</option>
            <option value="CHF">Switzerland (CHF)</option>
            <option value="CAD">Canada (CAD)</option>
            <option value="AUD">Australia (AUD)</option>
            <option value="JPY">Japan (JPY)</option>
            <option value="TRY">Turkey (TRY)</option>
            <option value="JOD">Jordan (JOD)</option>
            <option value="KWD">Kuwait (KWD)</option>
            <option value="EGP">Egypt (EGP)</option>
            <option value="INR">India (INR)</option>
        </select>

        <label>Search Any Currency Code (Ex: BHD, QAR, MXN)</label>
        <input type="text" id="curSearch" placeholder="Type code..." oninput="calculate()">
        <div id="searchResult"></div>

        <label>Live Forex & Crypto Estimates</label>
        <div class="currency-list">
            <div class="cur-item"><span>EUR</span><span class="cur-val" id="res-EUR">0</span></div>
            <div class="cur-item"><span>GBP</span><span class="cur-val" id="res-GBP">0</span></div>
            <div class="cur-item"><span>AED</span><span class="cur-val" id="res-AED">0</span></div>
            <div class="cur-item"><span>BTC</span><span class="cur-val" id="res-BTC">0</span></div>
        </div>
    </div>
</div>

<script>
    let mode = 'coin'; // Default
    const rates = {
        "USD": 1, "EUR": 0.88, "GBP": 0.76, "JPY": 152.4, "CAD": 1.36, "AED": 3.67, 
        "LBP": 90000, "CHF": 0.91, "SAR": 3.75, "TRY": 32.5, "JOD": 0.71, "KWD": 0.31,
        "EGP": 48.2, "INR": 83.5, "BTC": 0.000014, "ETH": 0.00045, "SOL": 0.0065
    };

    function setMode(newMode) {
        mode = newMode;
        document.getElementById('btnCoin').classList.toggle('active', mode === 'coin');
        document.getElementById('btnDiamond').classList.toggle('active', mode === 'diamond');
        document.getElementById('inputLabel').innerText = mode === 'coin' ? "Enter Amount of Coins" : "Enter Amount of Diamonds";
        calculate();
    }

    function calculate() {
        let val = parseFloat(document.getElementById('mainInput').value) || 0;
        let creatorUSD = 0;
        let fanUSD = 0;

        if (mode === 'coin') {
            creatorUSD = val * 0.005; // 1 Coin = 0.5 Diamond = $0.005
            fanUSD = val * 0.015;      // Approx cost to buyer
        } else {
            creatorUSD = val * 0.005; // 1 Diamond = $0.005
            fanUSD = (val * 2) * 0.015; // Diamonds are half of coins
        }

        // Main Outputs
        document.getElementById('usdResult').innerText = "$" + creatorUSD.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('fanCost').innerText = "$" + fanUSD.toLocaleString(undefined, {minimumFractionDigits: 2});

        // Forex List
        for (let code in rates) {
            let el = document.getElementById('res-' + code);
            if(el) {
                let converted = creatorUSD * rates[code];
                el.innerText = (code === "BTC") ? converted.toFixed(7) : converted.toLocaleString(undefined, {maximumFractionDigits: 2});
            }
        }

        // Search Logic
        let query = document.getElementById('curSearch').value.toUpperCase();
        let box = document.getElementById('searchResult');
        if(rates[query] && query !== "") {
            box.style.display = "block";
            box.innerText = query + " Payout: " + (creatorUSD * rates[query]).toLocaleString();
        } else { box.style.display = "none"; }
    }

    function applyCountry() {
        let code = document.getElementById('countrySelect').value;
        if(code) {
            document.getElementById('curSearch').value = code;
            calculate();
        }
    }
</script>
</body>
</html>
